name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install musl (musl target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare tarball
        id: tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          STAGING="chameleon-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/chameleon" "${STAGING}/"
          echo "Chameleon ${VERSION}. Extract and put the 'chameleon' binary in your PATH." > "${STAGING}/README.txt"
          tar czvf "${STAGING}.tar.gz" "${STAGING}"
          echo "path=${STAGING}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.tarball.outputs.path }}

  build-linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross

      - name: Build with cross
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Prepare tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          TARGET=aarch64-unknown-linux-gnu
          STAGING="chameleon-${VERSION}-${TARGET}"
          mkdir -p "${STAGING}"
          cp "target/${TARGET}/release/chameleon" "${STAGING}/"
          echo "Chameleon ${VERSION}. Extract and put the 'chameleon' binary in your PATH." > "${STAGING}/README.txt"
          tar czvf "${STAGING}.tar.gz" "${STAGING}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-unknown-linux-gnu
          path: chameleon-*-aarch64-unknown-linux-gnu.tar.gz

  build-macos:
    name: macOS ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          STAGING="chameleon-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/chameleon" "${STAGING}/"
          echo "Chameleon ${VERSION}. Extract and put the 'chameleon' binary in your PATH." > "${STAGING}/README.txt"
          tar czvf "${STAGING}.tar.gz" "${STAGING}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: chameleon-*-${{ matrix.target }}.tar.gz

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-linux, build-linux-aarch64, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect tarballs for release
        id: collect
        run: |
          {
            echo 'files<<EOF'
            find artifacts -name '*.tar.gz' -type f
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect.outputs.files }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
